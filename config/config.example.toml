# Example 1coder config — copy to ~/.config/1coder/config.toml and edit
# (Windows: %APPDATA%\1coder\config.toml).
#
# The editor ships with these defaults compiled in. You do not need this file
# for them to work. Keep only the keys you want to change, or start from this
# full listing.
#
# Reload with :config-reload. If something fails to parse, the status line shows
# a short hint; open the details with :config-error-log.
#
# Precedence for fonts: built-in discovery → [font] here → EDITOR_FONT* env vars.

# [font]
# path = "/usr/share/fonts/TTF/JetBrainsMono-Regular.ttf"
# face = ""
# size = 16.0

# Preferred language servers (tried before the built-in candidate list).
# [lsp.cpp]
# command = "clangd"
# [lsp.rust]
# command = "rust-analyzer"
# [lsp.go]
# command = "gopls"
# [lsp.python]
# command = "basedpyright-langserver"
# args = ["--stdio"]
# [lsp.typescript]
# command = "typescript-language-server"
# args = ["--stdio"]

# Theme colours (any omitted key keeps the compiled default).
# [theme]
# background = "#121212"
# text = "#FAFBF6"
# cursor = "#FAFBF6"
# cursor_text = "#121212"
# selection = "#46425E"
# search_match = "#5B768D"
# current_line = "#FFFFFF08"
# line_number = "#FAFBF659"
# line_number_current = "#FAFBF6E6"
# status_background = "#5B768D"
# status_text = "#FAFBF6"
# status_background_inactive = "#46425E"
# status_text_inactive = "#FAFBF6A6"
# split_border = "#46425E"
# message = "#FAFBF6BF"
# error = "#E06C75"
# diagnostic_error = "#E06C75"
# diagnostic_warning = "#E5C07B"
# diagnostic_information = "#61AFEF"
# diagnostic_hint = "#98C379"
# popup_background = "#1B1D23"
# popup_border = "#46425E"
# popup_selected = "#5B768DD9"
# popup_text = "#FAFBF6"
# popup_detail = "#FAFBF6BF"
#
# [theme.syntax]
# default = "#FAFBF6"
# keyword = "#C678DD"
# identifier = "#FAFBF6"
# type = "#E5C07B"
# function = "#61AFEF"
# string = "#98C379"
# character = "#98C379"
# number = "#D19A66"
# comment = "#6B7280"
# operator = "#56B6C2"
# punctuation = "#FAFBF6B3"
# preprocessor = "#C678DD"
# constant = "#D19A66"
# error = "#E06C75"


[bindings.global]
"<C-w>v" = "split-vertical"
"<C-w>s" = "split-horizontal"
"<C-w>h" = "focus-left"
"<C-w>j" = "focus-down"
"<C-w>k" = "focus-up"
"<C-w>l" = "focus-right"
"<C-w>c" = "close"
"<C-w>o" = "only"
"<C-f>" = "only"
"<C-=>" = "zoom-in"
"<C-+>" = "zoom-in"
"<C-->" = "zoom-out"
"<C-0>" = "zoom-reset"

[bindings.normal]
"i" = "insert-mode"
"I" = "insert-line-start"
"a" = "append"
"A" = "append-line-end"
"o" = "open-line-below"
"O" = "open-line-above"
"R" = "replace-mode"
"r" = "replace-char"
"~" = "toggle-case"
"v" = "visual-mode"
"V" = "visual-line-mode"
"\"" = "select-register"
"d" = "operator-delete"
"c" = "operator-change"
"y" = "operator-yank"
">" = "operator-indent"
"<" = "operator-dedent"
"x" = "delete-char"
"X" = "delete-char-before"
"D" = "delete-to-line-end"
"C" = "change-to-line-end"
"p" = "put"
"P" = "put-before"
