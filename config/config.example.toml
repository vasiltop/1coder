"gd" = "definition"
"gD" = "declaration"
"gt" = "type-definition"
"<C-o>" = "jump-older"
"<C-i>" = "jump-newer"
"<Tab>" = "jump-newer"
"<C-d>" = "scroll-half-page-down"
"<C-u>" = "scroll-half-page-up"
"<C-e>" = "scroll-line-down"
"<C-y>" = "scroll-line-up"
"zz" = "center-line"
"-" = "explorer"
":" = "command-line-open"
"<Esc>" = "normal-mode"
"<C-h>" = "focus-left"
