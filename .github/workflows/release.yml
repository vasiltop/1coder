name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    # git-bash on the Windows runner, so one set of scripting covers all three.
    shell: bash

jobs:
  build:
    strategy:
      # Let the other platforms finish and upload rather than being cancelled,
      # so one break shows up as one red job. The release is still all or
      # nothing: publish needs every build to have succeeded.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-14
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      # Submodules, unlike CI: this job ships the editor binary, which needs SDL.
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # SDL Linux build deps:
          # https://wiki.libsdl.org/SDL3/README-linux#build-dependencies
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libwayland-dev \
            libdecor-0-dev

      # macOS and Windows need nothing extra: SDL builds against the platform
      # SDKs already on the runner.
      - name: Install just
        run: |
          case "${{ runner.os }}" in
            Linux)
              curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
                | bash -s -- --to "$HOME/.local/bin"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              ;;
            macOS)   brew install just ;;
            Windows) choco install just --no-progress -y ;;
          esac

      - name: Build release
        run: just release

      # Packaging a binary that never passed the suite is the one failure this
      # workflow cannot take back once the assets are published.
      - name: Test release build
        run: ./build-release/editor_tests

      - name: Package binary
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          name="1coder-${tag}-${{ matrix.platform }}"
          mkdir -p "$name"
          cp README.md "$name/"

          case "${{ runner.os }}" in
            Linux)
              strip -s build-release/editor
              install -Dm755 build-release/editor "${name}/1coder"
              tar -czf "${name}.tar.gz" "$name"
              asset="${name}.tar.gz"
              sum="sha256sum"
              ;;
            macOS)
              # Apple's strip has no -s; the default already drops the symbol
              # table from an executable.
              strip build-release/editor
              install -m755 build-release/editor "${name}/1coder"
              tar -czf "${name}.tar.gz" "$name"
              asset="${name}.tar.gz"
              # macOS ships shasum but no sha256sum; git-bash is the reverse.
              sum="shasum -a 256"
              ;;
            Windows)
              cp build-release/editor.exe "${name}/1coder.exe"
              7z a -tzip "${name}.zip" "$name" >/dev/null
              asset="${name}.zip"
              sum="sha256sum"
              ;;
          esac

          $sum "$asset" > "${asset}.sha256"
          echo "asset=${asset}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.asset }}
            ${{ env.asset }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # gh is preinstalled on the runner and uses GITHUB_TOKEN, so there is no
      # third-party action in the path. GitHub's asset upload backend returns
      # sporadic 5xx ("Error creating policy"), hence the retries.
      #
      # One job rather than one per platform: the recreate step below would
      # otherwise have three runners deleting each other's release.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          # Nothing is checked out here -- only artifacts are needed -- so gh
          # has no git remote to infer the repository from and must be told.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          # Recreate rather than reuse: a failed run can leave behind a draft
          # release with missing or half-uploaded assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag=false
          fi

          for attempt in 1 2 3 4 5; do
            if gh release create "$TAG" \
                 --title "$TAG" \
                 --generate-notes \
                 artifacts/*; then
              exit 0
            fi
            echo "release attempt $attempt failed, retrying in $((attempt * 15))s" >&2
            gh release delete "$TAG" --yes --cleanup-tag=false || true
            sleep $((attempt * 15))
          done

          echo "release failed after 5 attempts" >&2
          exit 1
