name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    # git-bash on the Windows runner, so one set of scripting covers all three.
    shell: bash

env:
  # MSBuild's node-reuse pool (used by the Visual Studio generator under -j)
  # leaves worker processes alive past the build, which has raced the
  # freshly-linked test binary's first run on the Windows runner. No-op on
  # Linux/macOS, which build with make instead of MSBuild.
  MSBUILDDISABLENODEREUSE: "1"

jobs:
  ci:
    strategy:
      # A break on one platform should not hide the result on the others.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # No submodules, so SDL is absent and CMake skips the editor target by
      # design. The tests link core only and are what this workflow is for.
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # cmake and MSVC are already on the macOS and Windows runners.
      - name: Install just
        run: |
          case "${{ runner.os }}" in
            Linux)
              curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
                | bash -s -- --to "$HOME/.local/bin"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              ;;
            macOS)   brew install just ;;
            Windows) choco install just --no-progress -y ;;
          esac

      - name: CI
        run: just ci
