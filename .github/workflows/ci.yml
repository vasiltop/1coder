name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    # git-bash on the Windows runner, so one set of scripting covers all three.
    shell: bash

env:
  # MSBuild's node-reuse pool (used by the Visual Studio generator under -j)
  # leaves worker processes alive past the build, which has raced the
  # freshly-linked test binary's first run on the Windows runner. No-op on
  # Linux/macOS, which build with make instead of MSBuild.
  MSBUILDDISABLENODEREUSE: "1"

jobs:
  ci:
    strategy:
      # A break on one platform should not hide the result on the others.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    # The suite runs in about a minute; anything approaching this is a deadlock
    # in a test, and a hung runner otherwise sits for the six hour default.
    timeout-minutes: 15
    steps:
      # No submodules, so SDL is absent and CMake skips the editor target by
      # design. The tests link core only and are what this workflow is for.
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # cmake and MSVC are already on the macOS and Windows runners.
      - name: Install just
        run: |
          case "${{ runner.os }}" in
            Linux)
              curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
                | bash -s -- --to "$HOME/.local/bin"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              ;;
            macOS)   brew install just ;;
            Windows) choco install just --no-progress -y ;;
          esac

      - name: CI
        if: runner.os != 'Windows'
        run: just ci

      # TEMPORARY: Windows alternates between dying at command_line_resolves_names
      # (msys reports 127 for everything, so the real status is unknown) and
      # deadlocking. A deadlock inside `just ci` gets the job cancelled on
      # timeout, and cancellation skips failure() steps, so the diagnostics
      # never run. Drive the steps directly instead, each individually bounded,
      # so one run yields the real exit status whichever way it goes.
      # Restore the plain `just ci` for all platforms once Windows is green.
      - name: CI (Windows, instrumented)
        if: runner.os == 'Windows'
        env:
          EDITOR_TESTS_TRACE: 1
        run: |
          just build
          # The previous cmd.exe attempt never actually ran: msys passes the
          # quoting through literally, so cmd got the quotes as part of the
          # command and printed a bare prompt. Start-Process reports the real
          # Windows status, which msys otherwise collapses to 127.
          status() {
            powershell -NoProfile -Command \
              '$p = Start-Process -FilePath "build\editor_tests.exe" -ArgumentList $args[0] -Wait -PassThru -NoNewWindow -RedirectStandardOutput out.txt -RedirectStandardError err.txt; Write-Host ("EXIT=" + $p.ExitCode + " (0x" + ("{0:X8}" -f $p.ExitCode) + ")")' \
              "$1"
            echo "  stderr tail:"; tail -3 err.txt || true
          }
          echo "=== control: a test that passes ==="
          status buffer_save_empty_file
          echo "=== the suspect, in isolation ==="
          status command_line_resolves_names
          echo "=== the suspect, repeated, to show whether it is intermittent ==="
          for i in 1 2 3 4 5; do status command_line_resolves_names; done
          echo "=== full suite ==="
          status ""
          echo "--- trace tail ---"
          tail -5 err.txt || true
          # Fail the job on a bad full-suite status. The previous revision ended
          # every command with `|| echo`, which reported success while the suite
          # was still dying -- a green that meant nothing.
          grep -q "^0 " out.txt 2>/dev/null || true
          tail -1 out.txt | grep -q "0 failed" || { echo "SUITE DID NOT PASS"; exit 1; }
